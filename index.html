<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blurt</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --text:#111111;--text2:#666666;--text3:#999999;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --accent:#111111;--accent-text:#ffffff;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--green-border:#9FE1CB;
  --red-text:#a32d2d;--red-border:rgba(163,45,45,.25);--red-bg:rgba(163,45,45,.05);
  --input-bg:#f7f7f5;--input-border:rgba(0,0,0,0.12);
  --sidebar-w:230px;
}
[data-theme="dark"]{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --text:#f0f0f0;--text2:#999999;--text3:#666666;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --accent:#f0f0f0;--accent-text:#1a1a1a;
  --green:#1D9E75;--green-bg:rgba(29,158,117,0.15);--green-text:#5DCAA5;--green-border:rgba(29,158,117,0.3);
  --red-text:#f09595;--red-border:rgba(240,149,149,.2);--red-bg:rgba(240,149,149,.06);
  --input-bg:#2e2e2e;--input-border:rgba(255,255,255,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;transition:background .25s,color .25s}
input,textarea,select,button{font-family:inherit;color:var(--text)}

.app{display:flex;height:100vh;overflow:hidden}

.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  border-right:1px solid var(--border);background:var(--bg3);
  display:flex;flex-direction:column;overflow:hidden;
  transition:background .25s,width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:0;min-width:0;border-right:none}
.sidebar-top{padding:18px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-title{font-size:16px;font-weight:600;letter-spacing:-.3px;white-space:nowrap;overflow:hidden}
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .15s;color:var(--text2)}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.sidebar-sort{padding:0 8px 6px;flex-shrink:0}
.sort-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px}
.sort-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);flex:1}
.sort-btn{font-size:11px;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:2px 4px;border-radius:4px}
.sort-btn:hover{color:var(--text2)}
.sort-btn.active{color:var(--text)}
.subject-list{flex:1;overflow-y:auto;padding:4px 8px;overflow-x:hidden}
.subject-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:13px;color:var(--text2);border-radius:8px;transition:background .15s,color .15s,transform .15s;margin-bottom:2px;white-space:nowrap;overflow:hidden}
.subject-item:hover{background:var(--bg);color:var(--text);transform:translateX(2px)}
.subject-item.active{background:var(--bg);color:var(--text);font-weight:500}
.subject-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .2s}
.subject-item:hover .subject-dot,.subject-item.active .subject-dot{transform:scale(1.25)}
.subject-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.subject-count{font-size:11px;color:var(--text3);flex-shrink:0}
.sidebar-footer{padding:8px 8px 14px;border-top:1px solid var(--border);flex-shrink:0}
.add-subject-btn{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:8px;background:transparent;cursor:pointer;color:var(--text2);text-align:left;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s,transform .15s;white-space:nowrap}
.add-subject-btn:hover{background:var(--bg);color:var(--text);transform:translateX(2px)}

.sidebar-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;color:var(--text2)}
.sidebar-toggle:hover{background:var(--bg2);color:var(--text)}
.toggle-icon{display:flex;flex-direction:column;gap:4px;width:14px}
.toggle-icon span{display:block;height:1.5px;background:currentColor;border-radius:1px;transform-origin:center;transition:transform .25s,opacity .25s}
.sidebar.collapsed ~ .main .toggle-icon span:nth-child(1){transform:translateY(5.5px) rotate(45deg)}
.sidebar.collapsed ~ .main .toggle-icon span:nth-child(2){opacity:0;transform:scaleX(0)}
.sidebar.collapsed ~ .main .toggle-icon span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);min-width:0}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);transition:background .25s;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

.btn{padding:7px 14px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:8px;background:transparent;cursor:pointer;color:var(--text2);transition:background .15s,color .15s,transform .1s;white-space:nowrap}
.btn:hover{background:var(--bg2);color:var(--text)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--accent-text);border-color:transparent}
.btn-primary:hover{opacity:.85;background:var(--accent);color:var(--accent-text)}
.btn-danger{color:var(--red-text);border-color:var(--red-border)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}

.content{flex:1;overflow-y:auto;padding:24px;min-width:0}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:background .25s}
.stat-n{font-size:24px;font-weight:600;letter-spacing:-.5px}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;background:var(--bg3);padding:4px;border-radius:10px;border:1px solid var(--border);transition:background .25s}
.tab{padding:6px 14px;font-size:12px;font-weight:500;border:none;border-radius:7px;background:transparent;cursor:pointer;color:var(--text2);transition:background .15s,color .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg);color:var(--text)}

.topic-block{margin-bottom:28px}
.topic-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.topic-label{font-size:13px;font-weight:600;color:var(--text);flex:1}
.topic-actions{display:flex;gap:5px}

.subtopic-list{margin-bottom:8px}
.subtopic-row{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;background:var(--bg);transition:background .25s}
.subtopic-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;transition:background .15s}
.subtopic-header:hover{background:var(--bg2)}
.subtopic-chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.subtopic-row.open .subtopic-chevron{transform:rotate(90deg)}
.subtopic-name{font-size:12px;font-weight:600;color:var(--text2);flex:1}
.subtopic-count{font-size:11px;color:var(--text3)}
.subtopic-body{display:none;padding:0 10px 10px}
.subtopic-row.open .subtopic-body{display:block}
.subtopic-actions{display:flex;gap:5px;padding:6px 12px 8px;border-top:1px solid var(--border)}

.progress-wrap{margin-bottom:10px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.progress-label{font-size:11px;color:var(--text3)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:9px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:15px;transition:border-color .15s,background .25s}
.card:hover{border-color:var(--border2)}
.card-sp{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.card-q{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4}
.card-hint{font-size:11px;color:var(--text3);margin-bottom:10px;font-style:italic}
.blurt-field{width:100%;min-height:68px;padding:9px 11px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);font-size:12px;resize:vertical;line-height:1.6;color:var(--text);transition:border-color .15s,background .25s}
.blurt-field:focus{outline:none;border-color:var(--border2)}
.card-actions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.card-btn{padding:5px 10px;font-size:11px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;color:var(--text2);transition:background .1s,color .1s;white-space:nowrap}
.card-btn:hover{background:var(--bg2);color:var(--text)}
.card-btn.green{color:var(--green-text);border-color:var(--green-border)}
.card-btn.green:hover{background:var(--green-bg)}
.card-btn.red{color:var(--red-text);border-color:var(--red-border)}
.card-btn.red:hover{background:var(--red-bg)}
.answer-box{display:none;margin-top:10px;padding:10px 12px;background:var(--bg2);border-left:3px solid var(--green);font-size:12px;line-height:1.65;border-radius:0 6px 6px 0}
.answer-box.vis{display:block}
.answer-box ul{padding-left:1.1rem;margin-top:4px}
.answer-box li{margin-bottom:3px}
.my-note{display:none;margin-top:9px;padding:10px 12px;background:var(--green-bg);border-radius:8px;border:1px solid var(--green-border);font-size:12px;line-height:1.6}
.my-note.vis{display:block}
.my-note-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--green-text);margin-bottom:3px}
.my-note-text{color:var(--green-text)}

.empty{text-align:center;padding:70px 20px 40px;color:var(--text2)}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;margin-bottom:20px}
.dashed-add{font-size:12px;color:var(--text3);margin-bottom:8px;padding:11px 14px;background:var(--bg);border:1px dashed var(--border2);border-radius:8px;cursor:pointer;transition:background .15s,color .15s}
.dashed-add:hover{background:var(--bg2);color:var(--text2)}

/* ── Panel — slide + fade ── */
.panel-backdrop{
  position:fixed;inset:0;z-index:200;
  display:flex;justify-content:flex-end;
  /* backdrop fades in/out */
  background:rgba(0,0,0,0);
  transition:background .28s ease;
  /* hidden by default via pointer-events + visibility */
  pointer-events:none;
  visibility:hidden;
}
.panel-backdrop.open{
  pointer-events:all;
  visibility:visible;
  background:rgba(0,0,0,.28);
}
.panel{
  position:relative;
  width:400px;max-width:100vw;height:100%;
  background:var(--bg);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  /* starts off-screen AND invisible */
  transform:translateX(100%);
  opacity:0;
  transition:transform .3s cubic-bezier(.4,0,.2,1), opacity .25s ease;
  will-change:transform,opacity;
}
.panel-backdrop.open .panel{
  transform:translateX(0);
  opacity:1;
}
.panel-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-size:15px;font-weight:600}
.panel-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .15s}
.panel-close:hover{background:var(--bg2);color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:20px 22px}
.panel-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg)}
.spacer{flex:1}

.field{margin-bottom:18px}
.field-label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.field-input{width:100%;padding:10px 13px;border:1px solid var(--input-border);border-radius:9px;font-size:14px;background:var(--input-bg);color:var(--text);transition:border-color .15s,background .25s;line-height:1.5}
.field-input:focus{outline:none;border-color:var(--border2);background:var(--bg)}
.field-input.textarea{min-height:100px;resize:vertical;font-size:13px;line-height:1.65}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px}
.divider{height:1px;background:var(--border);margin:20px 0}
.section-note{font-size:12px;color:var(--text3)}

.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.sel{border-color:var(--text);transform:scale(1.15)}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="app-title">Blurt</div>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">☾</button>
    </div>
    <div class="sidebar-sort">
      <div class="sort-row">
        <span class="sort-label">Subjects</span>
        <button class="sort-btn active" id="sortAZ" onclick="setSortOrder('az')">A–Z</button>
        <button class="sort-btn" id="sortNew" onclick="setSortOrder('new')">New</button>
      </div>
    </div>
    <div class="subject-list" id="subjectList"></div>
    <div class="sidebar-footer">
      <button class="add-subject-btn" onclick="openPanel('subject')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Add subject
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <div class="toggle-icon"><span></span><span></span><span></span></div>
      </button>
      <div class="topbar-info">
        <div class="topbar-title" id="topbarTitle">Welcome to Blurt</div>
        <div class="topbar-sub" id="topbarSub">Select a subject to get started</div>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="mainContent">
      <div class="empty">
        <div class="empty-title">No subject selected</div>
        <div class="empty-sub">Add a subject from the sidebar to start building your revision cards.</div>
        <button class="btn btn-primary" onclick="openPanel('subject')">Add your first subject</button>
      </div>
    </div>
  </div>
</div>

<div class="panel-backdrop" id="panelBackdrop">
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle"></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-footer" id="panelFooter"></div>
  </div>
</div>

<script>
const PALETTE=[{c:'#534AB7'},{c:'#0F6E56'},{c:'#993C1D'},{c:'#185FA5'},{c:'#854F0B'},{c:'#993556'},{c:'#3B6D11'},{c:'#555555'}];
let state={subjects:[],activeSubId:null,activeTopicId:null,theme:'light',sidebarOpen:true,sortOrder:'az'};
let panel={type:null,editId:null,topicId:null,subtopicId:null,selColor:PALETTE[0].c};
let _closeTimer=null;


function load(){
  try{
    const raw=localStorage.getItem('blurt3');
    if(raw) state=JSON.parse(raw);
  }catch(e){}
  if(!state.subjects)state.subjects=[];
  if(!state.theme)state.theme='light';
  if(state.sidebarOpen===undefined)state.sidebarOpen=true;
  if(!state.sortOrder)state.sortOrder='az';
  applyTheme();applySidebar();renderSidebar();
  if(state.activeSubId)renderMain();
}

function save(){
  try{localStorage.setItem('blurt3',JSON.stringify(state));}catch(e){}
}


function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';applyTheme();save();}
function applyTheme(){document.documentElement.setAttribute('data-theme',state.theme);document.getElementById('themeBtn').textContent=state.theme==='dark'?'☀':'☾';}

function toggleSidebar(){state.sidebarOpen=!state.sidebarOpen;applySidebar();save();}
function applySidebar(){document.getElementById('sidebar').classList.toggle('collapsed',!state.sidebarOpen);}

function setSortOrder(o){
  state.sortOrder=o;
  document.getElementById('sortAZ').classList.toggle('active',o==='az');
  document.getElementById('sortNew').classList.toggle('active',o==='new');
  save();renderSidebar();
}
function sortedSubjects(){const s=[...state.subjects];if(state.sortOrder==='az')s.sort((a,b)=>a.name.localeCompare(b.name));return s;}
function sortedTopics(topics){return[...topics].sort((a,b)=>{const na=topicNum(a.name),nb=topicNum(b.name);if(na!==null&&nb!==null)return na-nb;if(na!==null)return-1;if(nb!==null)return 1;return a.name.localeCompare(b.name);});}
function topicNum(n){const m=n.match(/^(?:topic\s*)?(\d+(\.\d+)?)/i);return m?parseFloat(m[1]):null;}
function sortedSubtopics(s){return sortedTopics(s);}

function renderSidebar(){
  const el=document.getElementById('subjectList');
  const subs=sortedSubjects();
  if(!subs.length){el.innerHTML='<div style="padding:10px;font-size:12px;color:var(--text3)">No subjects yet</div>';return;}
  el.innerHTML=subs.map(s=>{
    const count=s.topics?s.topics.reduce((a,t)=>a+allCards(t).length,0):0;
    return`<div class="subject-item${state.activeSubId===s.id?' active':''}" onclick="openSubject('${s.id}')">
      <span class="subject-dot" style="background:${s.color}"></span>
      <span class="subject-name">${esc(s.name)}</span>
      <span class="subject-count">${count}</span>
    </div>`;
  }).join('');
}

function allCards(t){let c=[...(t.cards||[])];(t.subtopics||[]).forEach(st=>c=c.concat(st.cards||[]));return c;}
function openSubject(id){state.activeSubId=id;state.activeTopicId=null;save();renderSidebar();renderMain();}

function renderMain(){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);
  if(!sub){document.getElementById('mainContent').innerHTML='<div class="empty"><div class="empty-title">Subject not found</div></div>';return;}
  const topics=sub.topics||[];
  const totalCards=topics.reduce((a,t)=>a+allCards(t).length,0);
  const notedCards=topics.reduce((a,t)=>a+allCards(t).filter(c=>c.myNote&&c.myNote.trim()).length,0);
  const ts=sortedTopics(topics);
  document.getElementById('topbarTitle').textContent=sub.name;
  document.getElementById('topbarSub').textContent=`${topics.length} topic${topics.length!==1?'s':''} · ${totalCards} card${totalCards!==1?'s':''}`;
  document.getElementById('topbarActions').innerHTML=`
    <button class="btn btn-sm" onclick="openPanel('topic')">+ Topic</button>
    <button class="btn btn-sm" onclick="openPanel('subject','${sub.id}')">Edit</button>
    <button class="btn btn-sm btn-danger" onclick="deleteSubject('${sub.id}')">Delete</button>`;
  if(!topics.length){document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="empty-title">No topics yet</div><div class="empty-sub">Add a topic to start creating revision cards.</div><button class="btn btn-primary" onclick="openPanel('topic')">Add first topic</button></div>`;return;}
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-n">${topics.length}</div><div class="stat-l">Topics</div></div>
    <div class="stat-card"><div class="stat-n">${totalCards}</div><div class="stat-l">Cards</div></div>
    <div class="stat-card"><div class="stat-n">${notedCards}</div><div class="stat-l">My notes</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab${!state.activeTopicId?' active':''}" onclick="setTopic(null)">All</button>
    ${ts.map(t=>`<button class="tab${state.activeTopicId===t.id?' active':''}" onclick="setTopic('${t.id}')">${esc(t.name)}</button>`).join('')}
  </div>`;
  const shown=state.activeTopicId?ts.filter(t=>t.id===state.activeTopicId):ts;
  shown.forEach(t=>{
    const dc=t.cards||[],sts=sortedSubtopics(t.subtopics||[]),allC=allCards(t),notedC=allC.filter(c=>c.myNote&&c.myNote.trim()).length,pct=allC.length?Math.round(notedC/allC.length*100):0;
    html+=`<div class="topic-block"><div class="topic-header"><span class="topic-label">${esc(t.name)}</span><div class="topic-actions">
      <button class="btn btn-sm" onclick="openPanel('subtopic',null,'${t.id}')">+ Subtopic</button>
      <button class="btn btn-sm" onclick="openPanel('card',null,'${t.id}',null)">+ Card</button>
      <button class="btn btn-sm btn-danger" onclick="deleteTopic('${t.id}')">Delete</button>
    </div></div>`;
    if(allC.length)html+=`<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label">${notedC} of ${allC.length} cards with your notes · ${pct}%</div></div>`;
    if(sts.length){
      html+=`<div class="subtopic-list">`;
      sts.forEach(st=>{
        const sc=st.cards||[],sn=sc.filter(c=>c.myNote&&c.myNote.trim()).length,sp=sc.length?Math.round(sn/sc.length*100):0;
        html+=`<div class="subtopic-row" id="st-${st.id}">
          <div class="subtopic-header" onclick="toggleSubtopic('${st.id}')">
            <span class="subtopic-chevron">▶</span>
            <span class="subtopic-name">${esc(st.name)}</span>
            <span class="subtopic-count">${sc.length} card${sc.length!==1?'s':''} · ${sp}%</span>
          </div>
          <div class="subtopic-body">
            ${sc.length?`<div class="progress-wrap" style="padding:8px 2px 4px"><div class="progress-bar"><div class="progress-fill" style="width:${sp}%"></div></div><div class="progress-label">${sn} of ${sc.length} noted</div></div>`:''}
            ${sc.length?`<div class="cards-grid">${sc.map(c=>cardHTML(t.id,c,st.id)).join('')}</div>`:`<div class="dashed-add" onclick="openPanel('card',null,'${t.id}','${st.id}')">+ Add first card to this subtopic</div>`}
          </div>
          <div class="subtopic-actions">
            <button class="btn btn-sm" onclick="openPanel('card',null,'${t.id}','${st.id}')">+ Card</button>
            <button class="btn btn-sm" onclick="openPanel('subtopic','${st.id}','${t.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteSubtopic('${t.id}','${st.id}')">Delete subtopic</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    if(dc.length){if(sts.length)html+=`<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:10px 0 8px">General cards</div>`;html+=`<div class="cards-grid">${dc.map(c=>cardHTML(t.id,c,null)).join('')}</div>`;}
    else if(!sts.length)html+=`<div class="dashed-add" onclick="openPanel('card',null,'${t.id}',null)">+ Add first card to this topic</div>`;
    html+=`</div>`;
  });
  document.getElementById('mainContent').innerHTML=html;
  (state.openSubtopics||[]).forEach(id=>{const el=document.getElementById('st-'+id);if(el)el.classList.add('open');});
}

function toggleSubtopic(id){
  const el=document.getElementById('st-'+id);if(!el)return;
  el.classList.toggle('open');
  if(!state.openSubtopics)state.openSubtopics=[];
  if(el.classList.contains('open'))state.openSubtopics.push(id);
  else state.openSubtopics=state.openSubtopics.filter(x=>x!==id);
  save();
}

function cardHTML(tid,c,stid){
  const hasNote=c.myNote&&c.myNote.trim();
  return`<div class="card" id="card-${c.id}">
    ${c.sp?`<div class="card-sp">${esc(c.sp)}</div>`:''}
    <div class="card-q">${esc(c.q)}</div>
    ${c.hint?`<div class="card-hint">${esc(c.hint)}</div>`:''}
    <textarea class="blurt-field" id="ta-${c.id}" placeholder="Write everything you know..." rows="3"></textarea>
    <div class="card-actions">
      <button class="card-btn" id="ans-btn-${c.id}" onclick="toggleAnswer('${c.id}')">Show answer</button>
      ${hasNote?`<button class="card-btn green" onclick="toggleNote('${c.id}')">My note</button>`:''}
      <button class="card-btn green" onclick="saveNote('${tid}','${c.id}','${stid||''}')">Save note</button>
      <button class="card-btn" onclick="openPanel('card','${c.id}','${tid}','${stid||''}')">Edit</button>
      <button class="card-btn red" onclick="deleteCard('${tid}','${c.id}','${stid||''}')">Delete</button>
    </div>
    <div class="answer-box" id="ans-${c.id}">${c.answer?esc(c.answer):''}</div>
    ${hasNote?`<div class="my-note" id="note-${c.id}"><div class="my-note-label">My note</div><div class="my-note-text">${esc(c.myNote)}</div></div>`:''}
  </div>`;
}

function toggleAnswer(id){const a=document.getElementById('ans-'+id),b=document.getElementById('ans-btn-'+id);if(!a)return;a.classList.toggle('vis');b.textContent=a.classList.contains('vis')?'Hide answer':'Show answer';}
function toggleNote(id){const n=document.getElementById('note-'+id);if(n)n.classList.toggle('vis');}

function saveNote(tid,cid,stid){
  const val=(document.getElementById('ta-'+cid)||{}).value||'';if(!val.trim())return;
  const c=findCard(tid,cid,stid);if(!c)return;
  c.myNote=val.trim();save();
  const noteEl=document.getElementById('note-'+cid);
  if(noteEl){noteEl.querySelector('.my-note-text').innerHTML=esc(c.myNote);noteEl.classList.add('vis');}
  else{
    const card=document.getElementById('card-'+cid);
    const nd=document.createElement('div');nd.className='my-note vis';nd.id='note-'+cid;
    nd.innerHTML=`<div class="my-note-label">My note</div><div class="my-note-text">${esc(c.myNote)}</div>`;
    card.appendChild(nd);
    const acts=card.querySelector('.card-actions');
    if(!acts.querySelector('.card-btn.green[onclick*="toggleNote"]')){
      const b=document.createElement('button');b.className='card-btn green';b.textContent='My note';
      b.setAttribute('onclick',`toggleNote('${cid}')`);acts.insertBefore(b,acts.children[1]);
    }
  }
}

function findCard(tid,cid,stid){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return null;
  const t=sub.topics.find(t=>t.id===tid);if(!t)return null;
  if(stid){const st=(t.subtopics||[]).find(st=>st.id===stid);return st?(st.cards||[]).find(c=>c.id===cid):null;}
  return(t.cards||[]).find(c=>c.id===cid);
}

function setTopic(id){state.activeTopicId=id;renderMain();}

/* ── Panel open/close with animation ── */
function openPanel(type,editId,topicId,subtopicId){
  if(_closeTimer){clearTimeout(_closeTimer);_closeTimer=null;}
  panel.type=type;panel.editId=editId||null;panel.topicId=topicId||null;panel.subtopicId=subtopicId||null;
  if(type==='subject')buildSubjectPanel(editId);
  else if(type==='topic')buildTopicPanel(editId);
  else if(type==='subtopic')buildSubtopicPanel(editId,topicId);
  else if(type==='card')buildCardPanel(editId,topicId,subtopicId);
  const bd=document.getElementById('panelBackdrop');
  bd.classList.add('open');
  bd.addEventListener('click',_backdropClick);
  setTimeout(()=>{const f=document.querySelector('#panelBody input:not([type=hidden]),#panelBody textarea');if(f)f.focus();},320);
}

function closePanel(){
  const bd=document.getElementById('panelBackdrop');
  bd.classList.remove('open');
  bd.removeEventListener('click',_backdropClick);
}

function _backdropClick(e){if(e.target===document.getElementById('panelBackdrop'))closePanel();}

function setPanelColor(c){panel.selColor=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('sel',s.dataset.color===c));}

function buildSubjectPanel(editId){
  const sub=editId?state.subjects.find(s=>s.id===editId):null;
  panel.selColor=sub?sub.color:PALETTE[0].c;
  document.getElementById('panelTitle').textContent=sub?'Edit subject':'New subject';
  document.getElementById('panelBody').innerHTML=`
    <div class="field"><label class="field-label">Subject name</label>
      <input class="field-input" id="p-name" placeholder="e.g. Computer Science" value="${sub?esc(sub.name):''}"></div>
    <div class="field"><label class="field-label">Colour</label>
      <div class="color-grid">${PALETTE.map(p=>`<div class="color-swatch${panel.selColor===p.c?' sel':''}" data-color="${p.c}" style="background:${p.c}" onclick="setPanelColor('${p.c}')"></div>`).join('')}</div></div>`;
  document.getElementById('panelFooter').innerHTML=`
    ${sub?`<button class="btn btn-danger" onclick="deleteSubject('${sub.id}');closePanel()">Delete</button><span class="spacer"></span>`:''}
    <button class="btn" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSubject()">Save</button>`;
}

function buildTopicPanel(editId){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);
  const t=editId&&sub?sub.topics.find(t=>t.id===editId):null;
  document.getElementById('panelTitle').textContent=t?'Edit topic':'New topic';
  document.getElementById('panelBody').innerHTML=`
    <div class="field"><label class="field-label">Topic name</label>
      <input class="field-input" id="p-topic" placeholder="e.g. Topic 3: Computers" value="${t?esc(t.name):''}">
      <div class="field-hint">Topics starting with a number are sorted numerically</div></div>`;
  document.getElementById('panelFooter').innerHTML=`
    <button class="btn" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTopic()">Save topic</button>`;
}

function buildSubtopicPanel(editId,topicId){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);
  const t=sub&&sub.topics.find(t=>t.id===topicId);
  const st=editId&&t?(t.subtopics||[]).find(st=>st.id===editId):null;
  document.getElementById('panelTitle').textContent=st?'Edit subtopic':'New subtopic';
  document.getElementById('panelBody').innerHTML=`
    <div class="field"><label class="field-label">Subtopic name</label>
      <input class="field-input" id="p-stname" placeholder="e.g. 3.1 CPU & Memory" value="${st?esc(st.name):''}">
      <div class="field-hint">Adding to: ${t?esc(t.name):'–'}</div></div>`;
  document.getElementById('panelFooter').innerHTML=`
    ${st?`<button class="btn btn-danger" onclick="deleteSubtopic('${topicId}','${st.id}');closePanel()">Delete</button><span class="spacer"></span>`:''}
    <button class="btn" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSubtopic()">Save</button>`;
}

function buildCardPanel(editId,topicId,subtopicId){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);
  const t=sub&&sub.topics.find(t=>t.id===topicId);
  const st=subtopicId&&t?(t.subtopics||[]).find(st=>st.id===subtopicId):null;
  const pool=st?st.cards:t&&t.cards||[];
  const c=editId?pool.find(c=>c.id===editId):null;
  document.getElementById('panelTitle').textContent=c?'Edit card':'New card';
  document.getElementById('panelBody').innerHTML=`
    <div class="field"><label class="field-label">Spec point <span style="opacity:.5;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input class="field-input" id="p-sp" placeholder="e.g. SP 3.1.2" value="${c?esc(c.sp||''):''}"></div>
    <div class="field"><label class="field-label">Question</label>
      <input class="field-input" id="p-q" placeholder="e.g. What does the ALU do?" value="${c?esc(c.q||''):''}"></div>
    <div class="field"><label class="field-label">Hint <span style="opacity:.5;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input class="field-input" id="p-hint" placeholder="e.g. Think: arithmetic and logic..." value="${c?esc(c.hint||''):''}"></div>
    <div class="field"><label class="field-label">Model answer</label>
      <textarea class="field-input textarea" id="p-ans" placeholder="The ALU performs arithmetic and logic operations...">${c?esc(c.answer||''):''}</textarea></div>
    <div class="section-note">Adding to: <strong>${st?esc(st.name)+' › ':''} ${t?esc(t.name):'–'}</strong></div>`;
  document.getElementById('panelFooter').innerHTML=`
    ${c?`<button class="btn btn-danger" onclick="deleteCard('${topicId}','${c.id}','${subtopicId||''}');closePanel()">Delete</button><span class="spacer"></span>`:''}
    <button class="btn" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="saveCard()">Save card</button>`;
}

function saveSubject(){
  const name=v('p-name');if(!name.trim())return;
  if(panel.editId){const sub=state.subjects.find(s=>s.id===panel.editId);if(sub){sub.name=name.trim();sub.color=panel.selColor;}}
  else{state.subjects.push({id:uid(),name:name.trim(),color:panel.selColor,topics:[]});state.activeSubId=state.subjects[state.subjects.length-1].id;}
  save();closePanel();renderSidebar();renderMain();
}
function saveTopic(){
  const name=v('p-topic');if(!name.trim())return;
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  if(!sub.topics)sub.topics=[];
  if(panel.editId){const t=sub.topics.find(t=>t.id===panel.editId);if(t)t.name=name.trim();}
  else{const t={id:uid(),name:name.trim(),cards:[],subtopics:[]};sub.topics.push(t);state.activeTopicId=t.id;}
  save();closePanel();renderMain();
}
function saveSubtopic(){
  const name=v('p-stname');if(!name.trim())return;
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  const t=sub.topics.find(t=>t.id===panel.topicId);if(!t)return;
  if(!t.subtopics)t.subtopics=[];
  if(panel.editId){const st=t.subtopics.find(st=>st.id===panel.editId);if(st)st.name=name.trim();}
  else t.subtopics.push({id:uid(),name:name.trim(),cards:[]});
  save();closePanel();renderMain();
}
function saveCard(){
  const q=v('p-q');if(!q.trim())return;
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  const t=sub.topics.find(t=>t.id===panel.topicId);if(!t)return;
  const cardList=panel.subtopicId?((t.subtopics||[]).find(st=>st.id===panel.subtopicId)||{cards:[]}).cards:(t.cards=t.cards||[]);
  if(panel.editId){const c=cardList.find(c=>c.id===panel.editId);if(c){c.sp=v('p-sp');c.q=q.trim();c.hint=v('p-hint');c.answer=v('p-ans');}}
  else cardList.push({id:uid(),sp:v('p-sp'),q:q.trim(),hint:v('p-hint'),answer:v('p-ans'),myNote:''});
  save();closePanel();renderMain();
}
function v(id){return(document.getElementById(id)||{}).value||'';}

function deleteSubject(id){
  if(!confirm('Delete this subject and everything in it?'))return;
  state.subjects=state.subjects.filter(s=>s.id!==id);
  if(state.activeSubId===id){state.activeSubId=null;state.activeTopicId=null;}
  save();renderSidebar();
  document.getElementById('topbarTitle').textContent='Welcome to Blurt';
  document.getElementById('topbarSub').textContent='Select a subject to get started';
  document.getElementById('topbarActions').innerHTML='';
  document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="empty-title">Subject deleted</div><div class="empty-sub">Add or select a subject.</div><button class="btn btn-primary" onclick="openPanel('subject')">Add subject</button></div>`;
}
function deleteTopic(tid){
  if(!confirm('Delete this topic and all its cards?'))return;
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  sub.topics=sub.topics.filter(t=>t.id!==tid);
  if(state.activeTopicId===tid)state.activeTopicId=null;
  save();renderMain();
}
function deleteSubtopic(tid,stid){
  if(!confirm('Delete this subtopic and all its cards?'))return;
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  const t=sub.topics.find(t=>t.id===tid);if(!t)return;
  t.subtopics=(t.subtopics||[]).filter(st=>st.id!==stid);
  save();renderMain();
}
function deleteCard(tid,cid,stid){
  const sub=state.subjects.find(s=>s.id===state.activeSubId);if(!sub)return;
  const t=sub.topics.find(t=>t.id===tid);if(!t)return;
  if(stid){const st=(t.subtopics||[]).find(st=>st.id===stid);if(st)st.cards=(st.cards||[]).filter(c=>c.id!==cid);}
  else t.cards=(t.cards||[]).filter(c=>c.id!==cid);
  save();const el=document.getElementById('card-'+cid);if(el)el.remove();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
load();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
